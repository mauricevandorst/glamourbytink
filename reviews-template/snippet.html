<!--
  REVIEWS SECTIE — snippet voor in index.html
  Vereiste scripts (voor </body>):
    <script src="./js/google-reviews.js" defer></script>
  Vereiste assets:
    ./assets/files/google-reviews.json   (gegenereerd door update-reviews.mjs)
    ./assets/icons/google-icon.jpg
-->

<!-- Reviews -->
<section id="reviews" class="bg-black py-8 text-primary sm:py-12">
  <div class="mx-auto w-full max-w-6xl px-6" data-scroll-fade data-scroll-axis="x" data-scroll-distance="14">
    <div class="sm:p-8">
      <div class="mb-6 flex flex-col gap-2">
        <h2
          class="text-[1.65rem] sm:text-3xl font-extrabold uppercase tracking-[0.18em] md:text-center md:w-full md:text-4xl"
          data-scroll-fade data-scroll-axis="x" data-scroll-distance="18">
          Reviews
        </h2>
        <p id="reviews-summary" class="text-xs text-white/80 sm:text-sm md:text-center">Reviews worden geladen...</p>
      </div>

      <div class="mt-6 flex flex-wrap items-center justify-end gap-3 sm:flex-nowrap sm:justify-start">
        <button id="reviews-prev" type="button"
          class="order-2 inline-flex shrink-0 items-center justify-center rounded-full bg-black/70 p-2 text-white transition hover:text-white/70 disabled:opacity-40 sm:order-none"
          aria-label="Vorige reviews">
          <svg viewBox="0 0 20 20" class="block size-5" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd"
              d="M12.79 4.23a.75.75 0 0 1-.02 1.06L8.56 9.25h7.19a.75.75 0 0 1 0 1.5H8.56l4.21 3.96a.75.75 0 1 1-1.02 1.1l-5.5-5.17a.75.75 0 0 1 0-1.1l5.5-5.17a.75.75 0 0 1 1.04-.04Z"
              clip-rule="evenodd" />
          </svg>
        </button>

        <div class="order-1 min-w-0 basis-full overflow-hidden sm:order-none sm:basis-auto sm:flex-1">
          <div id="reviews-list" class="flex gap-4 transition-transform duration-500 ease-out"></div>
        </div>

        <button id="reviews-next" type="button"
          class="order-3 inline-flex shrink-0 items-center justify-center rounded-full bg-black/70 p-2 text-white transition hover:text-white/70 disabled:opacity-40 sm:order-none"
          aria-label="Volgende reviews">
          <svg viewBox="0 0 20 20" class="block size-5" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd"
              d="M7.21 15.77a.75.75 0 0 1 .02-1.06l4.21-3.96H4.25a.75.75 0 0 1 0-1.5h7.19L7.23 5.29a.75.75 0 1 1 1.02-1.1l5.5 5.17a.75.75 0 0 1 0 1.1l-5.5 5.17a.75.75 0 0 1-1.04.04Z"
              clip-rule="evenodd" />
          </svg>
        </button>
      </div>

      <div id="reviews-dots" class="mt-5 hidden items-center justify-center gap-2 sm:flex"
        aria-label="Carousel navigatie"></div>

      <div class="mt-8 flex justify-center">
        <a href="https://www.google.com/search?q=Oottattattoo+Assendelft" target="_blank"
          rel="noopener noreferrer"
          class="inline-flex items-center gap-2 rounded-[5px] border border-white/20 bg-white/5 px-5 py-2.5 text-xs font-medium text-white/80 transition hover:border-white/40 hover:text-white sm:text-sm">
          <img src="./assets/icons/google-icon.jpg" alt="" class="size-5 rounded-full object-cover" loading="lazy" />
          Bekijk meer op Google
        </a>
      </div>
    </div>
  </div>
</section>
